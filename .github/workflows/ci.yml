name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aiads
          POSTGRES_PASSWORD: aiads
          POSTGRES_DB: ai_ads_agent
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U aiads -d ai_ads_agent"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: aiads
      POSTGRES_PASSWORD: aiads
      POSTGRES_DB: ai_ads_agent
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      SECRET_KEY: ci-secret
      JWT_SECRET_KEY: ci-jwt-secret-key-1234567890-abcdef
      ENCRYPTION_KEY: ci-encryption-key
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.20"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Migrate
        run: uv run alembic upgrade head
      - name: Test
        run: uv run pytest -p no:cacheprovider

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Type-check
        run: pnpm typecheck
      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
