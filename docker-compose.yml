# ===========================================================================
# AI Ads Agent — local / base compose stack
# Services: postgres, redis, backend (API), worker (Celery), beat (scheduler),
#           frontend (Next.js), nginx (reverse proxy)
# ===========================================================================
name: ${COMPOSE_PROJECT_NAME:-ai-ads-agent}

x-backend-env: &backend-env
  ENVIRONMENT: ${ENVIRONMENT:-local}
  POSTGRES_USER: ${POSTGRES_USER:-aiads}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiads}
  POSTGRES_DB: ${POSTGRES_DB:-ai_ads_agent}
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  SECRET_KEY: ${SECRET_KEY:-dev-secret}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
  BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiads}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiads}
      POSTGRES_DB: ${POSTGRES_DB:-ai_ads_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiads} -d ${POSTGRES_DB:-ai_ads_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    environment:
      <<: *backend-env
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    command: celery -A app.worker.celery_app worker --loglevel=INFO --concurrency=2
    environment:
      <<: *backend-env
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    command: celery -A app.worker.celery_app beat --loglevel=INFO
    environment:
      <<: *backend-env
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-AI Ads Agent}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
