# Alembic configuration. The database URL is injected at runtime from
# application settings (see alembic/env.py), so it is intentionally omitted here.
[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
timezone = UTC

# Use a timestamped, descriptive filename for new revisions.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Ruff is a compiled binary (not a Python console_scripts entrypoint), so use
# the `exec` hook type to format newly generated revision files.
[post_write_hooks]
hooks = ruff_format, ruff_fix
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME
ruff_fix.type = exec
ruff_fix.executable = ruff
ruff_fix.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
