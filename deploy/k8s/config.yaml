apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: ai-ads-agent
data:
  ENVIRONMENT: "production"
  LOG_JSON: "true"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "ai_ads_agent"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  BACKEND_CORS_ORIGINS: "https://app.example.com"
---
# Template only — populate real values via a sealed secret or a cloud secret
# manager (e.g. `kubectl create secret generic backend-secrets --from-env-file`).
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: ai-ads-agent
type: Opaque
stringData:
  SECRET_KEY: "REPLACE_ME"
  JWT_SECRET_KEY: "REPLACE_ME"
  ENCRYPTION_KEY: "REPLACE_ME"
  POSTGRES_USER: "aiads"
  POSTGRES_PASSWORD: "REPLACE_ME"
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  GOOGLE_ADS_DEVELOPER_TOKEN: ""
  AI_API_KEY: ""
