apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: ai-ads-agent
  labels:
    app: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/abhi3975/aigoogleads-backend:latest
          command:
            ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=INFO", "--concurrency=4"]
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beat
  namespace: ai-ads-agent
  labels:
    app: beat
spec:
  # Exactly one scheduler instance.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: beat
  template:
    metadata:
      labels:
        app: beat
    spec:
      containers:
        - name: beat
          image: ghcr.io/abhi3975/aigoogleads-backend:latest
          command: ["celery", "-A", "app.worker.celery_app", "beat", "--loglevel=INFO"]
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
